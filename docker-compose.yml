# The full application as one block. End user runs: docker compose up
# Then opens http://localhost:3000. opencode is an internal engine and is NOT
# published to the host — only the `app` service is reachable.
name: reporting-agent

services:
  # One-shot root init: the `workspaces` named volume is created root-owned by
  # Docker, but app (node) and opencode (bun) both run as uid 1000 and must
  # mkdir/write session dirs under /workspaces. This chowns the volume to 1000
  # before those services start. Runs to completion then exits.
  init-workspaces:
    image: busybox:1.37
    command: ["sh", "-c", "chown -R 1000:1000 /workspaces && chmod 0775 /workspaces"]
    volumes:
      - workspaces:/workspaces
    restart: "no"

  converter:
    build:
      context: .
      dockerfile: docker/converter.Dockerfile
    expose:
      - "8000" # internal network only — intentionally not published
    restart: unless-stopped

  opencode:
    build:
      context: .
      dockerfile: docker/opencode.Dockerfile
    image: reporting-agent-opencode:local
    # Secrets are passed as explicit named variables only — no bulk env_file import.
    # Values are interpolated from .env at compose time via ${VAR} syntax.
    environment:
      # Secrets: only the two keys the engine actually needs.
      OPENCODE_GO_API_KEY: ${OPENCODE_GO_API_KEY}
      FACTCHECK_API_KEY: ${FACTCHECK_API_KEY:-}
      GEMMA_API_KEY: ${GEMMA_API_KEY:-}
      GEMMA_BASE_URL: ${GEMMA_BASE_URL:-}
      # Load OUR config explicitly; do not walk the tree for stray configs.
      OPENCODE_CONFIG: /config/opencode.json
      OPENCODE_CONFIG_DIR: /config/.opencode
      OPENCODE_DISABLE_PROJECT_CONFIG: "true"
      # The report-compaction plugin resolves session workspaces under this path.
      WORKSPACES_ROOT: /workspaces
    volumes:
      - ./opencode.json:/config/opencode.json:ro
      - ./prompts:/config/prompts:ro
      - ./.opencode:/config/.opencode:ro
      - ./mcp:/config/mcp:ro
      - workspaces:/workspaces
    expose:
      - "4096" # internal network only — intentionally not published
    depends_on:
      init-workspaces:
        condition: service_completed_successfully
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    image: reporting-agent-app:local
    environment:
      OPENCODE_SERVER_URL: http://opencode:4096
      OPENCODE_MODEL: ${OPENCODE_MODEL:-opencode-go/deepseek-v4-flash}
      WORKSPACES_ROOT: /workspaces
      NODE_ENV: production
      CONVERTER_URL: http://converter:8000
      MAX_CONTEXT_FILE_BYTES: "200000"
      # Optional BFF Basic Auth (audit C-1). NO-OP unless BOTH are set. Deliberately
      # given ONLY to the app — never to opencode/converter — so an in-engine request
      # cannot authenticate. Set in .env to enable before any networked deployment.
      APP_BASIC_AUTH_USER: ${APP_BASIC_AUTH_USER:-}
      APP_BASIC_AUTH_PASS: ${APP_BASIC_AUTH_PASS:-}
    ports:
      - "3000:3000" # the only port exposed to the user
    volumes:
      - workspaces:/workspaces
    depends_on:
      init-workspaces:
        condition: service_completed_successfully
      opencode:
        condition: service_started
      converter:
        condition: service_started
    restart: unless-stopped

volumes:
  workspaces:
