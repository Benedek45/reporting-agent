<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6c757d"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0d6efd"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#198754"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e67e22"/>
    </marker>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d6efd"/><stop offset="1" stop-color="#6610f2"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="960" height="720" fill="#f8f9fa" rx="8"/>

  <!-- title -->
  <rect x="0" y="0" width="960" height="52" fill="url(#header)" rx="8"/>
  <rect x="0" y="44" width="960" height="8" fill="url(#header)"/>
  <text x="480" y="34" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">Context Management System — reporting-agent (MIT)</text>

  <!-- ====== TOP FLOW: BFF → opencode ====== -->
  <rect x="40" y="72" width="200" height="38" rx="6" fill="#e8f0fe" stroke="#0d6efd"/>
  <text x="140" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#0d6efd">User (browser :3000)</text>

  <line x1="240" y1="91" x2="310" y2="91" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="275" y="84" text-anchor="middle" font-size="9" fill="#6c757d">SSE</text>

  <rect x="312" y="72" width="180" height="38" rx="6" fill="#fff" stroke="#dee2e6"/>
  <text x="402" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#212529">BFF (Next.js API)</text>

  <line x1="492" y1="91" x2="562" y2="91" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="527" y="84" text-anchor="middle" font-size="9" fill="#6c757d">REST</text>

  <rect x="564" y="72" width="200" height="38" rx="6" fill="#fff" stroke="#dee2e6"/>
  <text x="664" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#212529">opencode engine (:4096)</text>

  <!-- ====== Inside opencode ====== -->
  <rect x="80" y="130" width="800" height="410" rx="10" fill="none" stroke="#dee2e6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="100" y="150" font-size="12" font-weight="700" fill="#6c757d">INSIDE opencode — two MIT plugins</text>

  <!-- ── Plugin 1: context-manager.js ── -->
  <rect x="100" y="164" width="370" height="360" rx="8" fill="#f0f7ff" stroke="#0d6efd" stroke-width="1.2"/>
  <text x="120" y="186" font-size="13" font-weight="700" fill="#0d6efd">context-manager.js</text>
  <text x="120" y="202" font-size="9" fill="#6c757d">auto-discovered from .opencode/plugins/</text>

  <!-- hook chain -->
  <rect x="115" y="215" width="340" height="56" rx="5" fill="#fff" stroke="#dee2e6"/>
  <text x="125" y="233" font-size="11" font-weight="600" fill="#212529">experimental.chat.messages.transform</text>
  <text x="125" y="248" font-size="9.5" fill="#6c757d">on EVERY outgoing LLM request → run cascade pipeline below</text>
  <text x="125" y="263" font-size="9" fill="#adb5bd">(system.transform intentionally no-op — avoids prompt collision)</text>

  <!-- cascade box -->
  <rect x="115" y="280" width="340" height="155" rx="5" fill="#fff" stroke="#0d6efd" stroke-width="1"/>
  <text x="130" y="300" font-size="11" font-weight="700" fill="#0d6efd">Cascade pipeline (per-request, cost-ROI gated)</text>

  <!-- cascade steps -->
  <rect x="130" y="314" width="145" height="24" rx="3" fill="#e9ecef"/>
  <text x="202" y="331" text-anchor="middle" font-size="9.5" fill="#495057">1. Re-apply compressed blocks</text>

  <rect x="130" y="344" width="145" height="24" rx="3" fill="#e9ecef"/>
  <text x="202" y="361" text-anchor="middle" font-size="9.5" fill="#495057">2. Dedup (keep last occurrence)</text>

  <rect x="130" y="374" width="145" height="24" rx="3" fill="#e9ecef"/>
  <text x="202" y="391" text-anchor="middle" font-size="9.5" fill="#495057">3. Purge stale errored inputs</text>

  <rect x="130" y="404" width="145" height="24" rx="3" fill="#fff3cd" stroke="#e67e22" stroke-width="0.8"/>
  <text x="202" y="421" text-anchor="middle" font-size="9.5" fill="#e67e22">4. Observation mask / offload</text>

  <!-- cost-ROI gate at right -->
  <rect x="340" y="314" width="103" height="114" rx="4" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.8"/>
  <text x="391" y="330" text-anchor="middle" font-size="9" font-weight="600" fill="#6c757d">Cost-ROI Gate</text>
  <text x="391" y="346" text-anchor="middle" font-size="8.5" fill="#adb5bd">Nsaved × Eturns</text>
  <text x="391" y="360" text-anchor="middle" font-size="8.5" fill="#adb5bd">&gt; (R−1) × Nafter ?</text>
  <text x="391" y="378" text-anchor="middle" font-size="8.5" fill="#adb5bd">Cold cache → skip gate</text>
  <text x="391" y="394" text-anchor="middle" font-size="8.5" fill="#adb5bd">R≈50 DeepSeek</text>
  <text x="391" y="410" text-anchor="middle" font-size="8.5" fill="#adb5bd">R≈10 Anthropic</text>
  <text x="391" y="424" text-anchor="middle" font-size="8" fill="#adb5bd">profiles: documents/code</text>

  <!-- arrow between cascade and cost-roi -->
  <line x1="278" y1="390" x2="336" y2="390" stroke="#adb5bd" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- compress tool below cascade -->
  <rect x="115" y="450" width="175" height="62" rx="5" fill="#d1e7dd" stroke="#198754" stroke-width="1"/>
  <text x="130" y="470" font-size="11" font-weight="700" fill="#198754">compress tool (model-driven)</text>
  <text x="130" y="486" font-size="9" fill="#495057">Model picks closed ranges →</text>
  <text x="130" y="500" font-size="9" fill="#495057">structured 7-section summary</text>

  <!-- nudge feedback loop -->
  <line x1="290" y1="481" x2="290" y2="430" stroke="#198754" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="298" y="461" font-size="9" fill="#198754">nudge</text>

  <!-- dcp-compress slash command -->
  <rect x="300" y="450" width="160" height="62" rx="5" fill="#fff" stroke="#dee2e6"/>
  <text x="380" y="470" text-anchor="middle" font-size="10" font-weight="600" fill="#212529">/dcp-compress [focus]</text>
  <text x="380" y="486" text-anchor="middle" font-size="9" fill="#6c757d">Triggers model to call</text>
  <text x="380" y="500" text-anchor="middle" font-size="9" fill="#6c757d">compress tool on stable range</text>

  <!-- text.complete -->
  <rect x="115" y="445" width="340" height="6" rx="2" fill="#f8f9fa"/>
  <text x="120" y="440" font-size="8.5" fill="#adb5bd">experimental.text.complete — strips hallucinated ID tags from model output</text>
  <text x="440" y="440" font-size="8.5" fill="#adb5bd">event hook — tracks state/cache info</text>

  <!-- ── Plugin 2: report-compaction.js ── -->
  <rect x="500" y="164" width="370" height="360" rx="8" fill="#f0fdf4" stroke="#198754" stroke-width="1.2"/>
  <text x="520" y="186" font-size="13" font-weight="700" fill="#198754">report-compaction.js (safety net)</text>
  <text x="520" y="202" font-size="9" fill="#6c757d">last-resort at native compaction time</text>

  <rect x="515" y="218" width="340" height="80" rx="5" fill="#fff" stroke="#dee2e6"/>
  <text x="525" y="236" font-size="11" font-weight="600" fill="#212529">experimental.session.compacting</text>
  <text x="525" y="252" font-size="9.5" fill="#6c757d">open ended native compaction fires → inject back:</text>
  <text x="525" y="267" font-size="9.5" fill="#495057">• Active goal text</text>
  <text x="525" y="282" font-size="9.5" fill="#495057">• Report STATUS checklist</text>
  <text x="525" y="282" font-size="9.5" fill="#495057">• Every [DATA NEEDED] placeholder</text>

  <rect x="515" y="310" width="340" height="100" rx="5" fill="#fff" stroke="#dee2e6"/>
  <text x="530" y="330" font-size="11" font-weight="600" fill="#212529">Relationship</text>
  <text x="530" y="350" font-size="9.5" fill="#6c757d">context-manager handles PER-REQUEST pruning</text>
  <text x="530" y="368" font-size="9.5" fill="#6c757d">(dedup, stale-errors, mask, offload, model-compress)</text>
  <text x="530" y="386" font-size="9.5" fill="#6c757d">report-compaction is the LAST-RESORT fireguard</text>
  <text x="530" y="404" font-size="9.5" fill="#6c757d">when open ended native compaction eventually triggers</text>

  <!-- ── Bottom: workspace volume ── -->
  <rect x="80" y="560" width="800" height="70" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1.2"/>
  <text x="100" y="582" font-size="12" font-weight="700" fill="#6c757d">Docker shared volume — /workspaces (uid 1000)</text>

  <rect x="100" y="592" width="180" height="28" rx="4" fill="#e8f0fe" stroke="#0d6efd" stroke-width="0.8"/>
  <text x="190" y="611" text-anchor="middle" font-size="10" fill="#0d6efd">.context-manager/dcp/&lt;id&gt;.json</text>

  <rect x="300" y="592" width="260" height="28" rx="4" fill="#e9ecef"/>
  <text x="430" y="611" text-anchor="middle" font-size="10" fill="#495057">&lt;session&gt;/output/ <text fill="#6c757d">(files + report.md)</text></text>

  <rect x="580" y="592" width="220" height="28" rx="4" fill="#e9ecef"/>
  <text x="690" y="611" text-anchor="middle" font-size="10" fill="#495057">.sessions/&lt;id&gt; <text fill="#6c757d">(session state JSON)</text></text>

  <!-- arrows from plugins to volume -->
  <line x1="285" y1="524" x2="190" y2="588" stroke="#0d6efd" stroke-width="1" marker-end="url(#arrow-blue)"/>
  <line x1="685" y1="524" x2="430" y2="588" stroke="#198754" stroke-width="1" marker-end="url(#arrow-green)"/>

  <!-- ── Bottom: key ── -->
  <rect x="80" y="645" width="800" height="60" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="0.8"/>
  <text x="100" y="666" font-size="11" font-weight="700" fill="#212529">Key</text>

  <rect x="100" y="676" width="12" height="12" rx="2" fill="#0d6efd"/>
  <text x="116" y="686" font-size="9.5" fill="#495057">context-manager.js (MIT clean-room)</text>
  <rect x="340" y="676" width="12" height="12" rx="2" fill="#198754"/>
  <text x="356" y="686" font-size="9.5" fill="#495057">report-compaction.js (MIT)</text>
  <rect x="540" y="676" width="12" height="12" rx="2" fill="#e67e22"/>
  <text x="556" y="686" font-size="9.5" fill="#495057">Mask/offload step (cost-ROI gated)</text>
  <rect x="720" y="676" width="12" height="12" rx="2" fill="#6c757d"/>
  <text x="736" y="686" font-size="9.5" fill="#495057">Plumbing / routing</text>
</svg>
